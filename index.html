<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CostGuard – Deine Abos im Blick</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      : https://jmqusqvdvfjviiqvkoyk.supabase.co ,
       sb_publishable_0G8ra5LIb1HJM7Ja3isQOw_TMk1jVYi
    );

    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("waitlistForm");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;

        const { error } = await supabase
          .from("waitlist")
          .insert([{ email }]);

        if (error) {
          message.innerText = "Fehler beim Speichern.";
        } else {
          message.innerText = "Danke! Du bist auf der Warteliste.";
          form.reset();
        }
      });
    });
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f14;
      color: white;
      text-align: center;
    }
    .hero {
      margin-top: 15vh;
    }
    h1 {
      font-size: 3rem;
    }
    input {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 250px;
    }
    button {
      padding: 10px 15px;
      border-radius: 5px;
      border: none;
      background: #1e90ff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>CostGuard</h1>
    <p>Behalte alle deine Abonnements im Blick. Transparent. Einfach. Sicher.</p>
    <form id="waitlistForm">
      <input type="email" id="email" placeholder="Deine E-Mail" required>
      <button type="submit">Frühzugang sichern</button>
    </form>
    <p id="message"></p>
  </section>
</body>
</html>
